version: '3.8'

services:
  # ========================================================================
  # Servicio: Agente Inteligente del Metro de Santiago
  # ========================================================================
  agente-metro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-metro-santiago
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL:-}
      - SENDER_PASSWORD=${SENDER_PASSWORD:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./vector_db:/app/vector_db
      - ./data:/app/data
    networks:
      - metro-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: python agente_metro.py

  # ========================================================================
  # Servicio: Dashboard de Monitoreo (Streamlit)
  # ========================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-metro-santiago
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./vector_db:/app/vector_db
      - ./data:/app/data
    networks:
      - metro-network
    restart: unless-stopped
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - agente-metro

# ========================================================================
# Definición de Red
# ========================================================================

networks:
  metro-network:
    driver: bridge
    name: metro-network

# ========================================================================
# Volumes
# ========================================================================

volumes:
  logs:
  vector_db:
  data:
